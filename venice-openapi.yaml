  /embeddings:
    post:
      description: >-
        Create embeddings for the supplied input.


        **Authentication:** This endpoint accepts either a Bearer API key or an
        `X-Sign-In-With-X` header for x402 wallet-based authentication. When
        using x402, a `402 Payment Required` response indicates insufficient
        balance and includes top-up instructions.
      operationId: createEmbedding
      parameters:
        - description: Supported compression encodings (gzip, br)
          in: header
          name: Accept-Encoding
          required: false
          schema:
            example: gzip, br
            type: string
      security:
        - BearerAuth: []
        - siwx: []
      x-payment-info:
        price:
          mode: dynamic
          currency: USD
          min: "0.001"
          max: "10.00"
        protocols:
          - x402: {}
      summary: /api/v1/embeddings
      tags:
        - Embeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmbeddingRequestSchema"
      responses:
        "200":
          description: OK
          headers:
            X-Balance-Remaining:
              description: Remaining x402 credit balance in USD after this request (only
                present for x402 auth).
              required: false
              schema:
                type: string
                example: "4.230000"
            Content-Encoding:
              description: The encoding used to compress the response
              schema:
                enum:
                  - gzip
                  - br
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        embedding:
                          type: array
                          items:
                            type: number
                          description: The embedding vector
                        index:
                          type: integer
                          description: The index of this embedding in the list
                        object:
                          type: string
                          enum:
                            - embedding
                          description: The object type, which is always "embedding"
                      required:
                        - embedding
                        - index
                        - object
                    description: The list of embeddings generated by the model.
                  model:
                    type: string
                    description: The name of the model used to generate the embedding.
                  object:
                    type: string
                    enum:
                      - list
                    description: The object type, which is always "list"
                  usage:
                    type: object
                    properties:
                      prompt_tokens:
                        type: integer
                        description: The number of tokens used by the prompt.
                      total_tokens:
                        type: integer
                        description: The total number of tokens used by the request.
                    required:
                      - prompt_tokens
                      - total_tokens
                    description: The usage information for the request.
                required:
                  - data
                  - model
                  - object
                  - usage
                example:
                  data:
                    - embedding:
                        - 0.0023064255
                        - -0.009327292
                        - 0.015797377
                      index: 0
                      object: embedding
                  model: text-embedding-bge-m3
                  object: list
                  usage:
                    prompt_tokens: 8
                    total_tokens: 8
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailedError"
        "401":
          description: |-
            - Authentication failed
            - This model is only available to Pro users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "402":
          description: >-
            Payment or balance required. Response varies by authentication
            state:


            **API Key users:** Standard error response with
            `INSUFFICIENT_BALANCE` code. Top up your Venice balance at
            venice.ai.


            **Unauthenticated x402 discovery:** Structured x402 response with
            `x402Version`, `resource`, `accepts`, and `authOptions`. The
            `accepts` array advertises Base and Solana payment requirements.


            **Authenticated x402 wallet users with insufficient credit:**
            Structured response with `PAYMENT_REQUIRED` code containing:

            - `topUpInstructions`: Step-by-step guide to top up via x402
            protocol

            - `supportedTokens` / `supportedChains`: Accepted payment methods

            - `siwxChallenge`: Fresh Sign-In-With-X challenge metadata


            The `PAYMENT-REQUIRED` header also contains a base64-encoded x402
            protocol object with the payment requirements for programmatic
            discovery.
          headers:
            PAYMENT-REQUIRED:
              description: Base64-encoded JSON with x402 payment requirements. Present on x402
                middleware 402 responses. Decode to choose and sign one accepted
                payment requirement programmatically.
              required: false
              schema:
                type: string
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/StandardError"
                  - $ref: "#/components/schemas/X402InferencePaymentRequired"
        "415":
          description: Invalid request content-type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "500":
          description: Inference processing failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: The model is at capacity. Please try again later.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
