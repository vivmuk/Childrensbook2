                          - type: string
                          - type: array
                            items:
                              nullable: true
                          - nullable: true
                            title: "null"
                          - nullable: true
                            title: "null"
                      encrypted_content:
                        type: string
                        nullable: true
                      status:
                        type: string
                        nullable: true
                        enum:
                          - completed
                          - in_progress
                    required:
                      - type
                    title: Reasoning
                  - type: object
                    properties:
                      type:
                        type: string
                        enum:
                          - function_call
                      id:
                        type: string
                      call_id:
                        type: string
                      name:
                        type: string
                      arguments:
                        type: string
                      status:
                        type: string
                        enum:
                          - completed
                          - in_progress
                    required:
                      - type
                      - call_id
                      - name
                      - arguments
                    title: Function Call
                  - type: object
                    properties:
                      type:
                        type: string
                        enum:
                          - function_call_output
                      call_id:
                        type: string
                      output:
                        anyOf:
                          - type: string
                          - type: array
                            items:
                              nullable: true
                          - type: object
                            additionalProperties:
                              nullable: true
                          - type: number
                          - type: boolean
                          - nullable: true
                            title: "null"
                          - nullable: true
                            title: "null"
                    required:
                      - type
                      - call_id
                      - output
                    title: Function Call Output
                  - type: object
                    properties:
                      type:
                        type: string
                        enum:
                          - item_reference
                      id:
                        type: string
                    required:
                      - type
                      - id
                    title: Item Reference
          description: The input to generate a response for. Can be a simple string or an
            array of messages.
        include:
          type: array
          items:
            type: string
          description: Additional response fields to include (OpenAI-compatible).
        max_output_tokens:
          type: integer
          minimum: 0
          exclusiveMinimum: true
          description: Maximum number of tokens to generate.
        temperature:
          type: number
          minimum: 0
          maximum: 2
          description: Sampling temperature between 0 and 2.
        top_p:
          type: number
          minimum: 0
          maximum: 1
          description: Nucleus sampling parameter.
        reasoning:
          type: object
          nullable: true
          properties:
            effort:
              type: string
              enum:
                - none
                - minimal
                - low
                - medium
                - high
                - xhigh
                - max
              description: Controls reasoning effort level for supported models.
            summary:
              type: string
              enum:
                - auto
                - concise
                - detailed
              description: Controls reasoning summary format.
          title: Reasoning Configuration
        tools:
          type: array
          items:
            anyOf:
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - function
                  function:
                    type: object
                    properties:
                      name:
                        type: string
                      description:
                        type: string
                      parameters:
                        type: object
                        additionalProperties:
                          nullable: true
                      strict:
                        type: boolean
                    required:
                      - name
                required:
                  - type
                  - function
                title: Function Tool
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - web_search
                  search_context_size:
                    type: string
                    enum:
                      - low
                      - medium
                      - high
                  user_location:
                    type: object
                    properties:
                      type:
                        type: string
                        enum:
                          - approximate
                      city:
                        type: string
                      region:
                        type: string
                      country:
                        type: string
                      timezone:
                        type: string
                required:
                  - type
                title: Web Search Tool
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - x_search
                  allowed_x_handles:
                    type: array
                    items:
                      type: string
                    maxItems: 10
                  excluded_x_handles:
                    type: array
                    items:
                      type: string
                    maxItems: 10
                  from_date:
                    type: string
                  to_date:
                    type: string
                  enable_image_understanding:
                    type: boolean
                  enable_video_understanding:
                    type: boolean
                required:
                  - type
                title: X Search Tool
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - code_interpreter
                  container:
                    type: object
                    properties:
                      image:
                        type: string
                required:
                  - type
                title: Code Interpreter Tool
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - file_search
                  vector_store_ids:
                    type: array
                    items:
                      type: string
                  max_num_results:
                    type: integer
                  ranking_options:
                    type: object
                    properties:
                      ranker:
                        type: string
                      score_threshold:
                        type: number
                required:
                  - type
                title: File Search Tool
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - computer_use_preview
                  display_width:
                    type: integer
                  display_height:
                    type: integer
                  environment:
                    type: string
                required:
                  - type
                title: Computer Use Tool
              - type: object
                properties:
                  type:
                    type: string
                required:
                  - type
                title: Generic Tool
            title: Tool Definition
          description: A list of tools the model may call.
        tool_choice:
          anyOf:
            - type: string
              enum:
                - auto
            - type: string
              enum:
                - none
            - type: string
              enum:
                - required
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - function
                function:
                  type: object
                  properties:
                    name:
                      type: string
                  required:
                    - name
              required:
                - type
                - function
          description: Controls which tool is called by the model.
        web_search:
          type: boolean
          description: Enable web search for this request.
        stream:
          type: boolean
          description: Whether to stream back partial progress.
        venice_parameters:
          type: object
          properties:
            character_slug:
              type: string
              description: The character slug of a public Venice character.
            enable_e2ee:
              type: boolean
              description: Enable end-to-end encryption for E2EE-capable models. When true
                (default), E2EE is used if headers are present. When false,
                TEE-only mode is used.
            enable_web_search:
              type: string
              enum:
                - auto
                - off
                - on
              description: Enable web search for this request.
            enable_web_scraping:
              type: boolean
              description: Enable Venice web scraping of URLs in the latest user message.
            enable_web_citations:
              type: boolean
              description: Request that the LLM cite its sources.
            include_venice_system_prompt:
              type: boolean
              description: Whether to include the Venice supplied system prompts.
            include_search_results_in_stream:
              type: boolean
              description: Include search results in the stream as the first emitted chunk.
          title: Venice Parameters
      required:
        - model
        - input
      description: Request body for the Responses API endpoint. E2EE-capable models
        are not supported on /api/v1/responses; use /api/v1/chat/completions
        with the required E2EE headers instead.
      title: Responses API Request
    ResponsesResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the response.
          example: resp_abc123
        object:
          type: string
          enum:
            - response
          description: The object type.
        created_at:
          type: integer
          description: Unix timestamp of when the response was created.
        model:
          type: string
          description: The model used for the response.
        status:
          type: string
          enum:
            - completed
            - failed
            - in_progress
            - cancelled
          description: The status of the response.
        output:
          type: array
          items:
            anyOf:
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - reasoning
                  id:
                    type: string
                  summary:
                    type: array
                    items:
                      type: string
                  encrypted_content:
                    type: string
                required:
                  - type
                  - id
                title: Reasoning Output
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - message
                  id:
                    type: string
                  status:
                    type: string
                    enum:
                      - completed
                      - in_progress
                      - failed
                  role:
                    type: string
                    enum:
                      - assistant
                  content:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - output_text
                        text:
                          type: string
                        annotations:
                          type: array
                          items:
                            type: object
                            properties:
                              type:
                                type: string
                                enum:
                                  - url_citation
                              url:
                                type: string
                              title:
                                type: string
                              start_index:
                                type: integer
                              end_index:
                                type: integer
                            required:
                              - type
                              - url
                              - start_index
                              - end_index
                            title: URL Citation Annotation
                      required:
                        - type
                        - text
                      title: Output Text
                required:
                  - type
                  - id
                  - status
                  - role
                  - content
                title: Message Output
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - function_call
                  id:
                    type: string
                  call_id:
                    type: string
                  name:
                    type: string
                  arguments:
                    type: string
                  status:
                    type: string
                    enum:
                      - completed
                      - in_progress
                required:
                  - type
                  - id
                  - call_id
                  - name
                  - arguments
                  - status
                title: Function Call Output
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - web_search_call
                  id:
                    type: string
                  status:
                    type: string
                    enum:
                      - completed
                required:
                  - type
                  - id
                  - status
                title: Web Search Call Output
          description: The output items generated by the model.
        usage:
          type: object
          properties:
            input_tokens:
              type: integer
            input_tokens_details:
              type: object
              properties:
                cached_tokens:
                  type: integer
            output_tokens:
              type: integer
            output_tokens_details:
              type: object
              properties:
                reasoning_tokens:
                  type: integer
            total_tokens:
              type: integer
          required:
            - input_tokens
            - output_tokens
            - total_tokens
          description: Token usage statistics.
          title: Usage
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required:
            - code
            - message
          description: Error information if the response failed.
          title: Error
      required:
        - id
        - object
        - created_at
        - model
        - status
        - output
      description: Response from the Responses API endpoint.
      title: Responses API Response
    GenerateImageRequest:
      type: object
      properties:
        cfg_scale:
          type: number
          minimum: 0
          exclusiveMinimum: true
          maximum: 20
          description: CFG scale parameter. Higher values lead to more adherence to the
            prompt.
          example: 7.5
        embed_exif_metadata:
          type: boolean
          default: false
          description: Embed prompt generation information into the image's EXIF metadata.
          example: false
        format:
          type: string
          enum:
            - jpeg
            - png
            - webp
          default: webp
          description: "The image format to return. WebP are smaller and optimized for web
            use. PNG are higher quality but larger in file size. "
          example: webp
        height:
          type: integer
          minimum: 0
          exclusiveMinimum: true
          maximum: 1280
          default: 1024
          description: Height of the generated image.
          example: 1024
        hide_watermark:
          type: boolean
          default: false
          description: Whether to hide the Venice watermark. Venice may ignore this
            parameter for certain generated content.
          example: false
        inpaint:
          nullable: true
          description: This feature is deprecated and was disabled on May 19th, 2025. A
            revised in-painting API will be launched in the near future.
          deprecated: true
        lora_strength:
          type: integer
          minimum: 0
          maximum: 100
          description: Lora strength for the model. Only applies if the model uses
            additional Loras.
          example: 50
        model:
          type: string
          description: The model to use for image generation.
          example: grok-imagine-image
        negative_prompt:
          type: string
          maxLength: 7500
          description: A description of what should not be in the image. Character limit
            is model specific and is listed in the promptCharacterLimit
            constraint in the model list endpoint.
          example: Clouds, Rain, Snow
        prompt:
          type: string
          minLength: 1
          maxLength: 7500
          description: The description for the image. Character limit is model specific
            and is listed in the promptCharacterLimit setting in the model list
            endpoint.
          example: A beautiful sunset over a mountain range
        return_binary:
          type: boolean
          default: false
          description: Whether to return binary image data instead of base64.
          example: false
        variants:
          type: integer
          minimum: 1
          maximum: 4
          description: Number of images to generate (1–4). Only supported when
            return_binary is false.
          example: 3
        safe_mode:
          type: boolean
          default: true
          description: Whether to use safe mode. If enabled, this will blur images that
            are classified as having adult content.
          example: false
        seed:
          type: integer
          minimum: -999999999
          maximum: 999999999
          default: 0
          description: Random seed for generation. If not provided, a random seed will be
            used.
          example: 123456789
        steps:
          type: integer
          default: 8
          description: Number of inference steps. This model does not support steps - this
            field is ignored.
          example: 8
        style_preset:
          type: string
          description: An image style to apply to the image. Visit
            https://docs.venice.ai/api-reference/endpoint/image/styles for more
            details.
          example: 3D Model
        aspect_ratio:
          type: string
          description: 'Aspect ratio (utilized by certain image models including Nano
            Banana). Examples: "1:1", "16:9".'
          example: 1:1
        resolution:
          type: string
          description: 'Resolution (utilized by certain image models including Nano
            Banana). Examples: "1K", "2K", "4K".'
          example: 1K
        quality:
          type: string
          enum:
            - low
            - medium
            - high
          description: Output quality for supported models (e.g. GPT Image 2 / GPT Image 2
            Edit). Higher values can increase the final request charge. See the
            model list for supported options.
          example: high
        enable_web_search:
          type: boolean
          description: Enable web search for the image generation task. This will allow
            the model to use the latest information from the web to generate the
            image. Only supported by certain models. If web search is used,
            additional credits are getting charged.
          example: false
        width:
          type: integer
          minimum: 0
          exclusiveMinimum: true
          maximum: 1280
          default: 1024
          description: Width of the generated image.
          example: 1024
      required:
        - model
        - prompt
      additionalProperties: false
    SimpleGenerateImageRequest:
      type: object
      properties:
        background:
          type: string
          nullable: true
          enum:
            - transparent
            - opaque
            - auto
          default: auto
          description: This parameter is not used in Venice image generation but is
            supported for compatibility with OpenAI API
          example: auto
        model:
          type: string
          default: default
          description: The model to use for image generation. Defaults to Venice's default
            image model. If a non-existent model is specified (ie an OpenAI
            model name), it will default to Venice's default image model.
          example: grok-imagine-image
        moderation:
          type: string
          nullable: true
          enum:
            - low
            - auto
          default: auto
          description: auto enables safe venice mode which will blur out adult content.
            low disables safe venice mode.
          example: auto
        n:
          type: integer
          nullable: true
          minimum: 1
          maximum: 1
          default: 1
          description: Number of images to generate. Venice presently only supports 1
            image per request.
          example: 1
        output_compression:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
          default: 100
          description: This parameter is not used in Venice image generation but is
            supported for compatibility with OpenAI API
        output_format:
          type: string
          enum:
            - jpeg
            - png
            - webp
          default: png
          description: Output format for generated images
          example: png
        prompt:
          type: string
          minLength: 1
          maxLength: 1500
          description: A text description of the desired image.
          example: A beautiful sunset over mountain ranges
        quality:
          type: string
          nullable: true
          enum:
            - auto
            - high
            - medium
            - low
            - hd
            - standard
          default: auto
          description: This parameter is not used in Venice image generation but is
            supported for compatibility with OpenAI API
          example: auto
        response_format:
          type: string
          nullable: true
          enum:
            - b64_json
            - url
          default: b64_json
          description: Response format. URL will be a data URL.
          example: b64_json
        size:
          type: string
          nullable: true
          enum:
            - auto
            - 256x256
            - 512x512
            - 1024x1024
            - 1536x1024
            - 1024x1536
            - 1792x1024
            - 1024x1792
          default: auto
          description: Size of generated images. Default is 1024x1024
          example: 1024x1024
        style:
          type: string
          nullable: true
          enum:
            - vivid
            - natural
          default: natural
          description: This parameter is not used in Venice image generation but is
            supported for compatibility with OpenAI API
          example: natural
        user:
          type: string
          description: This parameter is not used in Venice image generation but is
            supported for compatibility with OpenAI API
          example: user123
      required:
        - prompt
      additionalProperties: false
    UpscaleImageRequest:
      type: object
      properties:
        enhance:
          anyOf:
            - type: boolean
            - type: string
              enum:
                - "true"
                - "false"
          default: "false"
          description: Whether to enhance the image using Venice's image engine during
            upscaling. Must be true if scale is 1.
          example: true
        enhanceCreativity:
          type: number
          nullable: true
          minimum: 0
          maximum: 1
          default: 0.5
          description: Higher values let the enhancement AI change the image more. Setting
            this to 1 effectively creates an entirely new image.
          example: 0.5
        enhancePrompt:
          type: string
          maxLength: 1500
          description: The text to image style to apply during prompt enhancement. Does
            best with short descriptive prompts, like gold, marble or angry,
            menacing.
          example: gold
        image:
          anyOf:
            - {}
            - type: string
          description: The image to upscale. Can be either a file upload or a
            base64-encoded string. Image dimensions must be at least 65536
            pixels and final dimensions after scaling must not exceed 16777216
            pixels. File size must be less than 25MB.
        replication:
          type: number
          nullable: true
          minimum: 0
          maximum: 1
          default: 0.35
          description: How strongly lines and noise in the base image are preserved.
            Higher values are noisier but less plastic/AI
            "generated"/hallucinated. Must be between 0 and 1.
          example: 0.35
        scale:
          type: number
          minimum: 1
          maximum: 4
          default: 2
          description: The scale factor for upscaling the image. Must be a number between
            1 and 4. Scale of 1 requires enhance to be set true and will only
            run the enhancer. Scale must be > 1 if enhance is false. A scale of
            4 with large images will result in the scale being dynamically set
            to ensure the final image stays within the maximum size limits.
          example: 2
      required:
        - image
      additionalProperties: false
      description: Upscale or enhance an image based on the supplied parameters. Using
        a scale of 1 with enhance enabled will only run the enhancer.
      example:
        enhance: true
        enhanceCreativity: 0.5
        enhancePrompt: gold
        image: iVBORw0KGgoAAAANSUhEUgAAAgAAAAIACAIAAAB7GkOtAAAAIGNIUk0A...
        scale: 2
    EditImageRequest:
      type: object
      properties:
        aspect_ratio:
          type: string
          enum:
            - auto
            - 1:1
            - 3:2
            - 16:9
            - 21:9
            - 9:16
            - 2:3
            - 3:4
            - 4:5
          description: The aspect ratio for the output image. Use 'auto' or omit this
            parameter to infer the closest supported aspect ratio from the input
            image when explicit sizing is required by the model. Supported
            values vary by model - check GET /api/v1/models for model-specific
            options.
          example: 16:9
        resolution:
          type: string
          minLength: 1
          maxLength: 10
          description: Resolution tier for the output image (e.g. "1K", "2K", "4K").
            Supported values vary by model - check GET /api/v1/models for
            model-specific options. Defaults to "1K" when not specified.
          example: 1K
        image:
          anyOf:
            - {}
            - type: string
            - type: string
              format: uri
          description: The image to edit. Can be either a file upload, a base64-encoded
            string, or a URL starting with http:// or https://. Image dimensions
            must be at least 65536 pixels and must not exceed 33177600 pixels.
            File size must be less than 25MB.
        model:
          type: string
          minLength: 1
          default: firered-image-edit
          description: The model ID to use for image editing.
        modelId:
          type: string
          minLength: 1
          description: 'Deprecated: Use "model" instead. The model ID to use for image
            editing.'
          deprecated: true
        output_format:
          type: string
          enum:
            - jpeg
            - png
            - webp
          description: "Output format for the edited image. Accepts jpeg, jpg, png, or
            webp. When omitted, the format is inferred from resolution: PNG for
            1K edits and JPEG for 2K/4K edits."
          example: png
        prompt:
          type: string
          minLength: 1
          maxLength: 32768
          description: The text directions to edit or modify the image. Short, descriptive
            prompts work best (e.g., "remove the tree", "change the sky to
            sunrise"). Character limit is model specific and is listed in the
            promptCharacterLimit setting in the model list endpoint.
          example: Change the color of the sky to a sunrise
        safe_mode:
          type: boolean
          default: true
          description: Whether to use safe mode. If enabled, this will blur images that
            are classified as having adult content.
          example: false
      required:
        - image
        - prompt
      additionalProperties: false
      description: Edit an image based on the supplied prompt.
      example:
        prompt: Colorize
        image: iVBORw0KGgoAAAANSUhEUgAAAgAAAAIACAIAAAB7GkOtAAAAIGNIUk0A...
    MultiEditImageRequest:
      type: object
      properties:
        aspect_ratio:
          type: string
          enum:
            - auto
            - 1:1
            - 3:2
            - 16:9
            - 21:9
            - 9:16
            - 2:3
            - 3:4
            - 4:5
          description: The aspect ratio for the output image. Use 'auto' or omit this
            parameter to infer the closest supported aspect ratio from the first
            input image when explicit sizing is required by the model.
          example: 16:9
        modelId:
          type: string
          minLength: 1
          default: firered-image-edit
          description: The model ID to use for multi-edit.
        output_format:
          type: string
          enum:
            - jpeg
            - png
            - webp
          description: "Output format for the edited image. Accepts jpeg, jpg, png, or
            webp. When omitted, the format is inferred from resolution: PNG for
            1K edits and JPEG for 2K/4K edits."
          example: png
        prompt:
          type: string
          minLength: 1
          maxLength: 32768
          description: The text directions to edit or modify the image. Short, descriptive
            prompts work best (e.g., "remove the tree", "change the sky to
            sunrise"). Character limit is model specific and is listed in the
            promptCharacterLimit setting in the model list endpoint.
        images:
          type: array
          items:
            anyOf:
              - type: string
                format: uri
              - type: string
            description: Image as a base64-encoded string or a URL starting with http:// or
              https://
          minItems: 1
          maxItems: 3
          description: Array of 1 to 3 images used for multi-editing. The first image is
            treated as the base image, and the remaining images are used as edit
            layers/masks. Each image can be a base64-encoded string or a URL
            starting with http:// or https://. Image dimensions must be at least
            65536 pixels and must not exceed 33177600 pixels. File size must be
            less than 25MB.
        quality:
          type: string
          enum:
            - low
            - medium
            - high
          description: Output quality for supported models (e.g. GPT Image 2 / GPT Image 2
            Edit). Higher values can increase the final request charge. See the
            model list for supported options.
          example: high
        resolution:
          type: string
          minLength: 1
          maxLength: 10
          description: Resolution tier for the output image (e.g. "1K", "2K", "4K").
            Supported values vary by model - check GET /api/v1/models for
            model-specific options. Defaults to "1K" when not specified.
          example: 1K
        safe_mode:
          type: boolean
          default: true
          description: Whether to use safe mode. If enabled, this will blur images that
            are classified as having adult content.
          example: false
      required:
        - prompt
        - images
      additionalProperties: false
      description: Edit an image by compositing up to three layered images with a
        single prompt. Supports base64-encoded strings and URLs.
    MultiEditImageMultipartRequest:
      type: object
      properties:
        aspect_ratio:
          type: string
          enum:
            - auto
            - 1:1
            - 3:2
            - 16:9
            - 21:9
            - 9:16
            - 2:3
            - 3:4
            - 4:5
          description: The aspect ratio for the output image. Use 'auto' or omit this
            parameter to infer the closest supported aspect ratio from the first
            input image when explicit sizing is required by the model.
          example: 16:9
        modelId:
          type: string
          minLength: 1
          default: firered-image-edit
          description: The model ID to use for multi-edit.
        output_format:
          type: string
          enum:
            - jpeg
            - png
            - webp
          description: "Output format for the edited image. Accepts jpeg, jpg, png, or
            webp. When omitted, the format is inferred from resolution: PNG for
            1K edits and JPEG for 2K/4K edits."
          example: png
        prompt:
          type: string
          minLength: 1
          maxLength: 32768
          description: The text directions to edit or modify the image. Short, descriptive
            prompts work best (e.g., "remove the tree", "change the sky to
            sunrise"). Character limit is model specific and is listed in the
            promptCharacterLimit setting in the model list endpoint.
        images:
          type: array
          items:
            type: string
            format: binary
          minItems: 1
          maxItems: 3
          description: Array of 1 to 3 image files. The first image is treated as the base
            image, and the remaining images are used as edit layers/masks.
        quality:
          type: string
          enum:
            - low
            - medium
            - high
          description: Output quality for supported models (e.g. GPT Image 2 / GPT Image 2
            Edit). Higher values can increase the final request charge. See the
            model list for supported options.
          example: high
        resolution:
          type: string
          minLength: 1
          maxLength: 10
          description: Resolution tier for the output image (e.g. "1K", "2K", "4K").
            Supported values vary by model - check GET /api/v1/models for
            model-specific options. Defaults to "1K" when not specified.
          example: 1K
        safe_mode:
          type: boolean
          default: true
          description: Whether to use safe mode. If enabled, this will blur images that
            are classified as having adult content.
          example: false
      required:
        - prompt
        - images
      description: Edit an image by compositing up to three layered image files with a
        single prompt. Only file uploads are supported with multipart/form-data.
    BackgroundRemoveImageRequest:
      type: object
      properties:
        image:
          anyOf:
            - {}
            - type: string
          description: The image to remove the background from. Can be either a file
            upload or a base64-encoded string. File size must be less than 25MB.
        image_url:
          type: string
          format: uri
          description: URL of the image to remove the background from.
          example: https://example.com/image.jpg
      additionalProperties: false
      description: Remove the background from an image. Provide either an image
        file/base64 or an image URL.
      example:
        image_url: https://example.com/image.jpg
    CreateEmbeddingRequestSchema:
      type: object
      properties:
        dimensions:
          type: integer
          minimum: 1
          description: The number of dimensions the resulting output embeddings should have.
        encoding_format:
          type: string
          enum:
            - float
            - base64
          default: float
          description: The format to return the embeddings in. Can be either `float` or
            `base64`.
          example: float
        input:
          anyOf:
            - type: string
              minLength: 1
              description: The string that will be turned into an embedding. Cannot be an
                empty string.
              example: This is a test.
              title: string
            - type: array
              items:
                type: string
              minItems: 1
              maxItems: 2048
              description: The array of strings that will be turned into an embedding. Array
                must be 2048 dimensions or less.
              example:
                - This is a test.
              title: array
            - type: array
              items:
                type: integer
                minimum: 1
              minItems: 1
              maxItems: 2048
              description: The array of integers that will be turned into an embedding. Array
                must be 2048 dimensions or less.
              example:
                - 1212
                - 318
                - 257
                - 1332
                - 13
              title: array
            - type: array
              items:
                type: array
                items:
                  type: integer
                minItems: 1
              minItems: 1
              maxItems: 2048
              description: The array of arrays containing integers that will be turned into an
                embedding. Array must be 2048 dimensions or less.
              example:
                - - 1212
                  - 318
                  - 257
                  - 1332
                  - 13
              title: array
          description: Input text to embed, encoded as a string or array of tokens. To
            embed multiple inputs in a single request, pass an array of strings
            or array of token arrays. The input must not exceed the max input
            tokens for the model (8192 tokens), cannot be an empty string, and
            any array must be 2048 dimensions or less.
          example: The quick brown fox jumped over the lazy dog
        model:
          anyOf:
            - type: string
            - type: string
              enum:
                - text-embedding-bge-m3
                - text-embedding-bge-en-icl
                - text-embedding-qwen3-8b
                - text-embedding-qwen3-0-6b
                - text-embedding-multilingual-e5-large-instruct
                - text-embedding-3-small
                - text-embedding-3-large
                - gemini-embedding-2-preview
                - text-embedding-nemotron-embed-vl-1b-v2
          description: ID of the model to use. You can use the List models API to see all
            of your available models, or see our Model overview for descriptions
            of them.
          example: text-embedding-bge-m3
        user:
          type: string
          description: This is an unused parameter and is discarded by Venice. It is
            supported solely for API compatibility with OpenAI.
      required:
        - input
        - model
      additionalProperties: false
      description: Create embeddings for the supplied input.
      example:
        encoding_format: float
        input: The quick brown fox jumped over the lazy dog
        model: text-embedding-bge-m3
    CreateSpeechRequestSchema:
      type: object
      properties:
        input:
          type: string
          minLength: 1
          maxLength: 4096
          description: The text to generate audio for. The maximum length is 4096
            characters.
          example: Hello, this is a test of the text to speech system.
        language:
          type: string
          minLength: 2
          maxLength: 32
          description: "Optional language hint. Accepted values are model-specific: Qwen 3
            accepts full names (English, Chinese, ...); xAI/ElevenLabs accept
            ISO 639-1 codes (en, ja, ...); MiniMax accepts full names.
            Unsupported values are silently ignored. Omit to let the model
            auto-detect."
          example: English
        model:
          type: string
          enum:
            - tts-kokoro
            - tts-qwen3-0-6b
            - tts-qwen3-1-7b
            - tts-xai-v1
            - tts-inworld-1-5-max
            - tts-chatterbox-hd
            - tts-orpheus
            - tts-elevenlabs-turbo-v2-5
            - tts-minimax-speech-02-hd
            - tts-gemini-3-1-flash
          default: tts-kokoro
          description: The model ID of a Venice TTS model.
          example: tts-xai-v1
        prompt:
          type: string
          maxLength: 500
          description: 'A style prompt to control the emotion and delivery of the speech.
            Supported by models advertising `supportsPromptParam` (currently
            Qwen 3 TTS). Ignored by other models. Examples: "Very happy.", "Sad
            and slow.", "Excited and energetic."'
          example: Very happy.
        response_format:
          type: string
          enum:
            - mp3
            - opus
            - aac
            - flac
            - wav
            - pcm
          default: mp3
          description: The format to audio in.
          example: mp3
        speed:
          type: number
          minimum: 0.25
          maximum: 4
          default: 1
          description: The speed of the generated audio. Select a value from 0.25 to 4.0.
            1.0 is the default.
          example: 1
        streaming:
          type: boolean
          default: false
          description: Should the content stream back sentence by sentence or be processed
            and returned as a complete audio file.
          example: true
        temperature:
          type: number
          minimum: 0
          maximum: 2
          description: Sampling temperature for speech generation. Higher values produce
            more varied output. Supported by models advertising
            `supportsTemperatureParam` (Qwen 3, Orpheus, Chatterbox HD). Ignored
            by other models.
          example: 0.9
        top_p:
          type: number
          minimum: 0
          maximum: 1
          description: Nucleus sampling parameter. Supported by models advertising
            `supportsTopPParam` (currently Qwen 3 TTS). Ignored by other models.
          example: 1
        voice:
