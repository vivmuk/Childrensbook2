        - API Keys
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        apiKeyType:
                          type: string
                          enum:
                            - INFERENCE
                            - ADMIN
                          description: API Key type
                          example: ADMIN
                        consumptionLimits:
                          type: object
                          properties:
                            usd:
                              anyOf:
                                - type: number
                                  minimum: 0
                                  maximum: 9999999999
                                - nullable: true
                                  title: "null"
                                - nullable: true
                                  title: "null"
                              description: USD limit
                              example: 50
                            diem:
                              anyOf:
                                - type: number
                                  minimum: 0
                                  maximum: 9999999999
                                - nullable: true
                                  title: "null"
                                - nullable: true
                                  title: "null"
                              description: Diem limit
                              example: 10
                            vcu:
                              anyOf:
                                - type: number
                                  minimum: 0
                                  maximum: 9999999999
                                - nullable: true
                                  title: "null"
                                - nullable: true
                                  title: "null"
                              description: VCU limit (deprecated - use Diem instead)
                              deprecated: true
                              example: 100
                          description: The API Key consumption limits, evaluated against the window
                            selected by `limitPeriod`.
                          example:
                            usd: 50
                            diem: 10
                            vcu: 30
                        limitPeriod:
                          type: string
                          enum:
                            - EPOCH
                            - MONTH
                            - LIFETIME
                          description: Reset window the consumption limits apply to. `EPOCH` resets every
                            UTC day (legacy default). `MONTH` resets on the 1st
                            of each UTC calendar month. `LIFETIME` never resets,
                            so the limit acts as a permanent cap on the key.
                          example: MONTH
                        createdAt:
                          type: string
                          nullable: true
                          description: API Key creation date
                          example: 2023-10-01T12:00:00Z
                        description:
                          type: string
                          description: API Key description
                          example: Example API Key
                        expiresAt:
                          type: string
                          nullable: true
                          description: API Key expiration date
                          example: 2023-10-01T12:00:00Z
                        id:
                          type: string
                          description: API Key ID
                          example: e28e82dc-9df2-4b47-b726-d0a222ef2ab5
                        last6Chars:
                          type: string
                          description: Last 6 characters of the API Key
                          example: 2V2jNW
                        lastUsedAt:
                          type: string
                          nullable: true
                          description: API Key last used date
                          example: 2023-10-01T12:00:00Z
                        usage:
                          type: object
                          properties:
                            trailingSevenDays:
                              type: object
                              properties:
                                usd:
                                  type: string
                                  description: USD usage in the trailing 7 days
                                  example: "10.2424"
                                vcu:
                                  type: string
                                  description: VCU usage in the trailing 7 days (deprecated - use Diem instead)
                                  deprecated: true
                                  example: "42.2315"
                                diem:
                                  type: string
                                  description: Diem usage in the trailing 7 days
                                  example: "4.2231"
                              required:
                                - usd
                                - vcu
                                - diem
                          required:
                            - trailingSevenDays
                        currentPeriodUsage:
                          type: object
                          properties:
                            usd:
                              type: string
                              description: USD usage in the current limit period
                              example: "5.1234"
                            diem:
                              type: string
                              description: Diem usage in the current limit period
                              example: "2.5000"
                          required:
                            - usd
                            - diem
                          description: Usage within the current limit period window. Only present for keys
                            that have consumption limits set.
                      required:
                        - apiKeyType
                        - consumptionLimits
                        - limitPeriod
                        - createdAt
                        - expiresAt
                        - id
                        - last6Chars
                        - lastUsedAt
